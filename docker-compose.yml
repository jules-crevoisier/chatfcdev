services:
  chatfc:
    build: .
    container_name: chatfc
    restart: unless-stopped
    ports:
      - "3000:3000"        # change left side to expose on a different host port
    volumes:
      - ./data:/app/data       # users.json — persisted between restarts
      - ./uploads:/app/uploads # uploaded files
    environment:
      PORT: "3000"
