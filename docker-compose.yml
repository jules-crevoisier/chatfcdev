services:
  chatfc:
    build: .
    container_name: chatfc
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Dossiers du projet → tu vois la BDD ici : ./data/chatfc.db (pas dans un volume Docker opaque).
      - ./data:/app/data
      - ./uploads:/app/uploads
      # Frontend servi depuis le dépôt (sinon l’image garde une copie figée au build).
      - ./frontend:/app/frontend:ro
    environment:
      PORT: "3000"
